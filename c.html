<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lawson Point Partners</title>
  <meta name="description" content="Lawson Point Partners — a firm in formation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,300;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f6f3ec;
      --ink: #191612;
      --muted: #77705f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: clamp(1.5rem, 6vw, 5rem);
    }
    .label {
      position: fixed;
      top: clamp(1.5rem, 6vw, 5rem);
      left: clamp(1.5rem, 6vw, 5rem);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.34em;
      text-transform: uppercase;
    }
    .label span { color: var(--muted); }
    .statement {
      font-family: 'Spectral', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(2.6rem, 8vw, 6.2rem);
      line-height: 1.08;
      letter-spacing: -0.01em;
      max-width: 14ch;
      margin-bottom: clamp(2.5rem, 8vh, 5rem);
    }
    footer {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="label">Lawson Point <span>Partners</span></div>
  <h1 class="statement">A firm in&nbsp;formation.</h1>
  <footer>&copy; 2026 Lawson Point Partners LLC</footer>
</body>
</html>
