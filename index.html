<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lawson Point Partners</title>
  <meta name="description" content="Lawson Point Partners — a firm in formation.">
  <meta property="og:title" content="Lawson Point Partners">
  <meta property="og:description" content="A firm in formation.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://lawsonpoint.com/poster.jpg">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%23182A3E'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-family='Georgia, serif' font-size='26' letter-spacing='1' fill='%23F7F2E8'%3ELP%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* On brand: the footage is tinted to Navy #2E3C4D via a colour blend, with
       cool paper text, a Cloud-muted subline, and a Clay Rose hairline. */
    :root { --linen:#F2F3F3; --sand:#DEE3E2; --copper:#C4796B; --sage:#96B09D; --navy:46,60,77; --scrim:30,42,58; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      background:#1b242f;
      color:var(--linen);
      font-family:'Inter',ui-sans-serif,system-ui,sans-serif;
    }
    .ground { position:fixed; inset:0; z-index:-3; width:100%; height:100%; object-fit:cover; filter:brightness(0.92) saturate(0.78); }
    /* "Cool grade": a soft-light Navy wash keeps the footage's own light while cooling it to brand. */
    .tint { position:fixed; inset:0; z-index:-2; background:rgb(var(--navy)); mix-blend-mode:soft-light; opacity:0.55; }
    .scrim { position:fixed; inset:0; z-index:-1; background:
      radial-gradient(ellipse 60rem 30rem at 50% 47%, rgba(var(--scrim),0.45), rgba(var(--scrim),0.26) 62%, rgba(var(--scrim),0.16)),
      linear-gradient(to top, rgba(var(--scrim),0.6), rgba(var(--scrim),0.12) 32%, rgba(var(--scrim),0.12) 74%, rgba(var(--scrim),0.46)); }
    @media (prefers-reduced-motion: reduce) { .ground, .tint { display:none; } }
    /* Hero — unchanged, now its own full-viewport section */
    .hero { position:relative; min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; text-align:center; padding:calc(2rem + 12vh) 1.5rem 2rem; }
    main { position:relative; animation:settle 1.4s ease-out both; }
    /* copy scrim — soft haze behind the hero text so it reads over the bright waterline */
    main::before { content:''; position:absolute; z-index:0; inset:-3.5rem -2.5rem; pointer-events:none;
      background:radial-gradient(ellipse at center, rgba(18,24,33,0.52), rgba(18,24,33,0.26) 45%, transparent 72%); }
    main > * { position:relative; z-index:1; }
    @keyframes settle { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:none;} }
    @media (prefers-reduced-motion: reduce) { main { animation:none; } }
    .name { font-family:'Spectral',Georgia,serif; font-weight:500; font-size:clamp(2rem,6.4vw,4.2rem); letter-spacing:0.18em; text-indent:0.18em; text-transform:uppercase; line-height:1.12; text-shadow:0 1px 26px rgba(0,0,0,0.55); }
    .sub { margin-top:1.1rem; font-size:clamp(0.82rem,2.05vw,1.06rem); font-weight:500; letter-spacing:0.5em; text-indent:0.5em; text-transform:uppercase; color:var(--linen); text-shadow:0 1px 16px rgba(0,0,0,0.6); }
    .rule { width:3.5rem; height:2px; background:var(--copper); margin:2.6rem auto 2.2rem; box-shadow:0 0 14px rgba(196,121,107,0.55); }
    .status { font-family:'Spectral',Georgia,serif; font-style:italic; font-size:clamp(1.06rem,2.6vw,1.35rem); color:var(--linen); text-shadow:0 1px 16px rgba(0,0,0,0.6); }
    footer { position:absolute; bottom:1.75rem; left:0; right:0; font-size:0.7rem; letter-spacing:0.08em; color:rgba(242,243,243,0.6); text-align:center; }
  </style>
</head>
<body>
  <video class="ground" autoplay muted loop playsinline preload="auto" poster="poster.jpg" aria-hidden="true">
    <source src="hero.mp4" type="video/mp4">
  </video>
  <div class="tint" role="presentation"></div>
  <div class="scrim" role="presentation"></div>

  <section class="hero">
    <main>
      <h1 class="name">Lawson Point</h1>
      <div class="sub">Partners</div>
      <div class="rule" role="presentation"></div>
      <p class="status">A firm in formation.</p>
    </main>
    <footer>&copy; 2026 Lawson Point Partners LLC</footer>
  </section>
</body>
</html>
