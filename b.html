<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lawson Point Partners</title>
  <meta name="description" content="Lawson Point Partners — a firm in formation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f6f3ec;
      --ink: #191612;
      --muted: #77705f;
      --rule: #191612;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      min-height: 100vh;
      padding: clamp(1.5rem, 5vw, 4rem);
    }
    .head {
      border-top: 2px solid var(--rule);
      padding-top: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .entries {
      margin-top: clamp(5rem, 22vh, 12rem);
      max-width: 44rem;
    }
    .row {
      display: grid;
      grid-template-columns: 9.5rem 1fr;
      gap: 1rem;
      padding: 1.05rem 0;
      border-bottom: 1px solid #d9d3c5;
      font-size: 0.86rem;
      line-height: 1.5;
    }
    .row dt {
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding-top: 0.15rem;
    }
    .row dd { letter-spacing: 0.01em; }
    .row .em { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 1.02rem; letter-spacing: 0.01em; }
    footer {
      position: fixed;
      bottom: 1.4rem;
      right: clamp(1.5rem, 5vw, 4rem);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    }
    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; gap: 0.25rem; }
    }
  </style>
</head>
<body>
  <div class="head">
    <span>LAWSON POINT PARTNERS LLC</span>
    <span>RECORD OF FORMATION</span>
  </div>
  <dl class="entries">
    <div class="row">
      <dt>Name</dt>
      <dd class="em">Lawson Point Partners</dd>
    </div>
    <div class="row">
      <dt>Formed</dt>
      <dd>Delaware, 2026</dd>
    </div>
    <div class="row">
      <dt>Status</dt>
      <dd>A firm in formation.</dd>
    </div>
  </dl>
  <footer>&copy; 2026 Lawson Point Partners LLC</footer>
</body>
</html>
