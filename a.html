<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lawson Point Partners</title>
  <meta name="description" content="Lawson Point Partners — a firm in formation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@300;400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ground: #131110;
      --type: #ece7dd;
      --muted: #8d8578;
      --ember: 255, 158, 92;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--ground);
      color: var(--type);
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }
    .block {
      margin-left: clamp(1.5rem, 14vw, 13rem);
      margin-right: 1.5rem;
    }
    .name {
      font-family: 'Spectral', Georgia, serif;
      font-weight: 300;
      font-size: clamp(2.4rem, 6.5vw, 4.6rem);
      line-height: 1.05;
      letter-spacing: 0.01em;
    }
    .sub {
      margin-top: 1.1rem;
      font-size: clamp(0.6rem, 1.4vw, 0.72rem);
      font-weight: 500;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .status {
      margin-top: 4.5rem;
      font-family: 'Spectral', Georgia, serif;
      font-weight: 400;
      font-size: clamp(1.05rem, 2.2vw, 1.3rem);
      color: var(--muted);
      display: flex;
      align-items: baseline;
    }
    /* The point. The sentence ends in it; insiders know what it is. */
    .point {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-left: 0.42em;
      background: rgb(var(--ember));
      box-shadow:
        0 0 6px 1px rgba(var(--ember), 0.9),
        0 0 22px 6px rgba(var(--ember), 0.35),
        0 0 70px 24px rgba(var(--ember), 0.12);
      animation: breathe 9s ease-in-out infinite;
      transform: translateY(-1px);
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.85; }
      50%      { opacity: 1; box-shadow:
        0 0 7px 2px rgba(var(--ember), 1),
        0 0 28px 9px rgba(var(--ember), 0.45),
        0 0 90px 32px rgba(var(--ember), 0.16); }
    }
    @media (prefers-reduced-motion: reduce) {
      .point { animation: none; }
    }
    footer {
      position: fixed;
      bottom: 1.6rem;
      left: clamp(1.5rem, 14vw, 13rem);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: #5c564c;
    }
  </style>
</head>
<body>
  <main class="block">
    <h1 class="name">Lawson Point</h1>
    <div class="sub">Partners</div>
    <p class="status">A firm in formation<span class="point" role="presentation"></span></p>
  </main>
  <footer>&copy; 2026 Lawson Point Partners LLC</footer>
</body>
</html>
